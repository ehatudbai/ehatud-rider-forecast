<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rider Demand Forecast — ehatud</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F5F5F5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; color: #1A1A1A; line-height: 1.4; }
input[type="date"], select { font-family: inherit; }
input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.2s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// EHATUD RIDER DEMAND FORECAST TOOL
// Base orders & seasonal multipliers calibrated from actual 2025-2026 data
// Hinunangan: ~22 orders/day avg | Sogod: ~44 orders/day avg
// ─────────────────────────────────────────────────────────────────────────────

const BASE_ORDERS = { hinunangan: 22, sogod: 44 };
const RIDERS_PER_ORDER = 8;
const MIN_RIDERS = 2;

// Sun Mon Tue Wed Thu Fri Sat
const DOW_MULT = [1.20, 0.85, 0.88, 0.90, 0.92, 1.12, 1.28];

// Per-branch monthly seasonal multipliers — calibrated from actual 2025-2026 transaction data
// Hinunangan: peaks Jan & May, drops Jun-Jul, crashes Nov
// Sogod: low Jan, peaks Jun, crashes Nov
const MONTH_MULT = {
  hinunangan: [1.26, 1.18, 1.06, 1.03, 1.30, 0.81, 0.86, 0.94, 0.94, 1.01, 0.54, 1.06],
  sogod:      [0.62, 1.09, 1.04, 1.09, 1.11, 1.23, 1.08, 1.06, 1.02, 1.11, 0.53, 1.01],
};

const MONTH_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW_SHORT   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// Easter dates
const EASTERS = { 2024:[2,31], 2025:[3,20], 2026:[3,5], 2027:[2,28] };

function getNthWeekday(year, month, dow, n) {
  let count = 0;
  for (let d = 1; d <= 31; d++) {
    const dt = new Date(year, month, d);
    if (dt.getMonth() !== month) break;
    if (dt.getDay() === dow) { count++; if (count === n) return d; }
  }
  return null;
}

function getEvents(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
  const events = [];

  // Valentine's
  if (m === 1) {
    if (day === 14) events.push({ label: "\u{1F49D} Valentine\'s Day +90%", mult: 1.90 });
    else if (day >= 12 && day <= 16) events.push({ label: "\u{1F49D} Valentine\'s Week +45%", mult: 1.45 });
  }
  // Mother's Day (2nd Sunday of May)
  if (m === 4) {
    const md = getNthWeekday(y, 4, 0, 2);
    if (day === md) events.push({ label: "\u{1F338} Mother\'s Day +90%", mult: 1.90 });
    else if (md && Math.abs(day - md) <= 3) events.push({ label: "\u{1F338} Mother\'s Day Week +50%", mult: 1.50 });
  }
  // Father's Day (3rd Sunday of June)
  if (m === 5) {
    const fd = getNthWeekday(y, 5, 0, 3);
    if (day === fd) events.push({ label: "\u{1F454} Father\'s Day +40%", mult: 1.40 });
  }
  // Christmas
  if (m === 11) {
    if (day === 25)       events.push({ label: "\u{1F384} Christmas Day +120%", mult: 2.20 });
    else if (day === 24)  events.push({ label: "\u{1F384} Noche Buena +100%", mult: 2.00 });
    else if (day === 31)  events.push({ label: "\u{1F386} Bisperas ng Bagong Taon +80%", mult: 1.80 });
    else if (day >= 20)   events.push({ label: "\u{1F384} Christmas Week +60%", mult: 1.60 });
    else if (day >= 16)   events.push({ label: "\u{1F56F}\uFE0F Simbang Gabi +30%", mult: 1.30 });
  }
  // New Year
  if (m === 0 && day === 1) events.push({ label: "\u{1F386} New Year\'s Day +60%", mult: 1.60 });
  // Payday weeks
  const lastDay = new Date(y, m + 1, 0).getDate();
  if (day >= 13 && day <= 17) events.push({ label: "\u{1F4B0} Mid-month Payday +28%", mult: 1.28 });
  if (day >= lastDay - 1)     events.push({ label: "\u{1F4B0} Month-end Payday +28%", mult: 1.28 });
  // Holy Week
  const easter = EASTERS[y];
  if (easter) {
    const edt = new Date(y, easter[0], easter[1]);
    const diff = Math.round((d - edt) / 86400000);
    if (diff === 0)                events.push({ label: "\u271D\uFE0F Easter Sunday +50%", mult: 1.50 });
    else if (diff >= -3 && diff < 0) events.push({ label: "\u271D\uFE0F Holy Week +50%", mult: 1.50 });
  }
  return events;
}

function getDemandLevel(totalMult) {
  if (totalMult < 1.30) return { level: "NORMAL",         color: "#1A8C4E", bg: "#F0FFF0", border: "#1A8C4E" };
  if (totalMult < 1.60) return { level: "ELEVATED",       color: "#B45309", bg: "#FFF8E5", border: "#B45309" };
  if (totalMult < 2.20) return { level: "HIGH DEMAND",    color: "#C0392B", bg: "#FFF0F0", border: "#C0392B" };
  return                       { level: "CRITICAL SURGE", color: "#E02020", bg: "#FFE5E5", border: "#E02020" };
}

function computeForecast(dateStr, branch) {
  if (!dateStr) return { orders: 0, riders: 0, events: [], dowMult: 1, monthMult: 1, eventMult: 1, growthMult: 1, base: BASE_ORDERS[branch] || 22, totalMult: 1, ...getDemandLevel(1) };
  const d = new Date(dateStr + "T00:00:00");
  const base       = BASE_ORDERS[branch] || 22;
  const dowMult    = DOW_MULT[d.getDay()];
  const monthMult  = (MONTH_MULT[branch] || MONTH_MULT.hinunangan)[d.getMonth()];
  const events     = getEvents(dateStr);
  const eventMult  = events.length > 0 ? Math.max(...events.map(e => e.mult)) : 1.0;
  const growthMult = d >= new Date("2026-07-25T00:00:00") ? 1.15 : 1.0;
  const totalMult  = dowMult * monthMult * eventMult * growthMult;
  const orders     = Math.round(base * totalMult);
  const riders     = Math.max(MIN_RIDERS, Math.ceil(orders / RIDERS_PER_ORDER));
  return { orders, riders, events, dowMult, monthMult, eventMult, growthMult, totalMult, base, ...getDemandLevel(totalMult) };
}

function toDateStr(d) {
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,"0"), String(d.getDate()).padStart(2,"0")].join("-");
}

// ── State ───────────────────────────────────────────────────────────────────
const today = toDateStr(new Date());
let state = {
  selectedDate:   today,
  selectedBranch: "hinunangan",
  showBreakdown:  false,
  outlookDays:    90,
  activeDot:      null,
};

function setState(patch) {
  Object.assign(state, typeof patch === "function" ? patch(state) : patch);
  render();
}

// ── Chart ────────────────────────────────────────────────────────────────────
function buildChartSVG(selectedDate, branch, nDays, activeDot) {
  const W = 680, H = 210;
  const padL = 36, padR = 12, padT = 12, padB = 42;
  const cW = W - padL - padR, cH = H - padT - padB;

  const startDate = selectedDate ? new Date(selectedDate + "T00:00:00") : new Date();
  const days = [];
  for (let i = 0; i < nDays; i++) {
    const d = new Date(startDate); d.setDate(startDate.getDate() + i);
    const ds = toDateStr(d);
    const fc = computeForecast(ds, branch);
    days.push({ date: d, orders: fc.orders, riders: fc.riders, level: fc.level, color: fc.color, events: fc.events });
  }

  const maxO = Math.max(...days.map(d => d.orders));
  const minO = Math.min(...days.map(d => d.orders));
  const yPad = Math.max(3, Math.ceil((maxO - minO) * 0.14));
  const yMax = maxO + yPad, yMin = Math.max(0, minO - yPad);
  const yRange = yMax - yMin || 1;

  const toX = i  => padL + (i / Math.max(nDays - 1, 1)) * cW;
  const toY = o  => padT + cH - ((o - yMin) / yRange) * cH;

  const linePts = days.map((d, i) => `${i===0?"M":"L"}${toX(i).toFixed(1)},${toY(d.orders).toFixed(1)}`).join(" ");
  const areaPts = linePts + ` L${toX(nDays-1).toFixed(1)},${padT+cH} L${padL},${padT+cH} Z`;

  const step = nDays <= 7 ? 1 : nDays <= 30 ? 5 : nDays <= 60 ? 10 : 15;
  const xLabels = [];
  for (let i = 0; i < nDays; i += step) {
    const d = days[i];
    xLabels.push({
      x: toX(i),
      label:    i === 0 ? "Today" : `${MONTH_SHORT[d.date.getMonth()]} ${d.date.getDate()}`,
      subLabel: i === 0 ? `${MONTH_SHORT[d.date.getMonth()]} ${d.date.getDate()}` : DOW_SHORT[d.date.getDay()],
    });
  }

  const dotData = [];
  days.forEach((d, i) => {
    if (i === 0 || d.events.length > 0) {
      dotData.push({
        cx: toX(i), cy: toY(d.orders),
        r: i === 0 ? 4.5 : 3,
        color: i === 0 ? "#E02020" : d.color,
        dateLabel:  i === 0 ? "Today" : `${DOW_SHORT[d.date.getDay()]}, ${MONTH_SHORT[d.date.getMonth()]} ${d.date.getDate()}`,
        orders: d.orders, riders: d.riders,
        eventLabel: d.events.length > 0 ? d.events[0].label : null,
        idx: i,
      });
    }
  });

  const gridVals = [0.25, 0.5, 0.75, 1].map(f => Math.round(yMin + f * yRange));
  const gridLines = gridVals.map(v =>
    `<line x1="${padL}" y1="${toY(v).toFixed(1)}" x2="${W-padR}" y2="${toY(v).toFixed(1)}" stroke="#F0F0F0" stroke-width="1"/>
     <text x="${padL-5}" y="${toY(v).toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#C8C8C8" font-family="system-ui,sans-serif">${v}</text>`
  ).join("");

  const xLabelSVG = xLabels.map(xl =>
    `<text x="${xl.x.toFixed(1)}" y="${padT+cH+13}" text-anchor="middle" font-size="10" fill="${xl.label==="Today"?"#888":"#BBBBBB"}" font-weight="${xl.label==="Today"?600:400}" font-family="system-ui,sans-serif">${xl.label}</text>
     <text x="${xl.x.toFixed(1)}" y="${padT+cH+25}" text-anchor="middle" font-size="9" fill="#D0D0D0" font-family="system-ui,sans-serif">${xl.subLabel}</text>`
  ).join("");

  const dotsSVG = dotData.map((dot, di) =>
    `<circle cx="${dot.cx.toFixed(1)}" cy="${dot.cy.toFixed(1)}" r="${activeDot===di?dot.r+2:dot.r}" fill="${dot.color}" stroke="${activeDot===di?"#1A1A1A":"white"}" stroke-width="${activeDot===di?2:1.5}" style="cursor:pointer" data-dot="${di}" onclick="handleDotClick(${di})"/>`
  ).join("");

  // Tooltip
  let tooltipHTML = "";
  if (activeDot !== null && dotData[activeDot]) {
    const dot = dotData[activeDot];
    const onRight = dot.cx > W * 0.55;
    const tx = (dot.cx / W * 100).toFixed(1);
    const ty = (dot.cy / H * 100).toFixed(1);
    const transform = onRight ? "translate(-100%,-115%)" : "translate(8px,-115%)";
    tooltipHTML = `<div style="position:absolute;left:${tx}%;top:${ty}%;transform:${transform};background:#1A1A1A;color:#fff;border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;white-space:nowrap;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,0.28);line-height:1.55;">
      <div style="font-weight:700;margin-bottom:2px">${dot.dateLabel}</div>
      <div style="color:#CCC;font-size:11px">${dot.orders} orders · ${dot.riders} riders</div>
      ${dot.eventLabel ? `<div style="color:#FCD34D;font-size:11px;margin-top:3px">${dot.eventLabel}</div>` : ""}
    </div>`;
  }

  return `<div style="overflow-x:auto;position:relative" onclick="handleChartClick()">
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:460px;overflow:visible;display:block">
      ${gridLines}
      <path d="${areaPts}" fill="#E02020" fill-opacity="0.07"/>
      <path d="${linePts}" fill="none" stroke="#E02020" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="${toX(0).toFixed(1)}" y1="${padT}" x2="${toX(0).toFixed(1)}" y2="${padT+cH}" stroke="#E02020" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
      <line x1="${padL}" y1="${padT+cH}" x2="${W-padR}" y2="${padT+cH}" stroke="#EEEEEE" stroke-width="1"/>
      ${xLabelSVG}
      ${dotsSVG}
    </svg>
    ${tooltipHTML}
  </div>`;
}

// ── Month Calendar ────────────────────────────────────────────────────────────
function buildCalendar(branch, selectedDate) {
  const ref  = selectedDate ? new Date(selectedDate + "T00:00:00") : new Date();
  const curM = ref.getMonth();
  const year = ref.getFullYear();
  return Array.from({ length: 12 }, (_, m) => {
    const fc = computeForecast(`${year}-${String(m+1).padStart(2,"0")}-15`, branch);
    return `<div style="padding:10px 8px;border-radius:10px;background:${fc.bg};border:${m===curM?"2px solid #E02020":"1.5px solid #EEEEEE"};text-align:center">
      <div style="font-size:12px;font-weight:700;color:#1A1A1A;margin-bottom:3px">${MONTH_SHORT[m]}</div>
      <div style="font-size:9px;font-weight:800;color:${fc.color};letter-spacing:0.3px;margin-bottom:3px;text-transform:uppercase">${fc.level}</div>
      <div style="font-size:10px;color:#AAAAAA;font-variant-numeric:tabular-nums">~${fc.orders}</div>
    </div>`;
  }).join("");
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const { selectedDate, selectedBranch, showBreakdown, outlookDays, activeDot } = state;
  const fc = computeForecast(selectedDate, selectedBranch);
  const branchDisplay = selectedBranch === "hinunangan" ? "Hinunangan" : "Sogod";

  const d = selectedDate ? new Date(selectedDate + "T00:00:00") : new Date();
  const formattedDate = d.toLocaleDateString("en-US", { weekday:"long", year:"numeric", month:"long", day:"numeric" });

  const outlookRanges = [7, 30, 60, 90];
  const outlookBtns = outlookRanges.map(n =>
    `<button onclick="setState({outlookDays:${n},activeDot:null})" style="padding:4px 10px;border-radius:6px;border:none;background:${n===outlookDays?"#1A1A1A":"#F2F2F2"};color:${n===outlookDays?"#FFFFFF":"#888888"};font-size:11px;font-weight:${n===outlookDays?700:500};cursor:pointer;font-family:inherit">${n}d</button>`
  ).join("");

  const outlookTitle = outlookDays===90?"3-Month Outlook":outlookDays===60?"2-Month Outlook":outlookDays===30?"30-Day Outlook":"7-Day Outlook";

  const eventTags = fc.events.length > 0
    ? `<div style="display:flex;flex-wrap:wrap;gap:6px;padding-top:14px;margin-top:14px;border-top:1px solid #F5F5F5">
        ${fc.events.map(ev => `<span style="font-size:11px;font-weight:600;padding:4px 10px;background:#FFF8E5;border:1px solid #F59E0B;color:#92400E;border-radius:12px;white-space:nowrap">${ev.label}</span>`).join("")}
       </div>`
    : "";

  const breakdownPanel = showBreakdown
    ? `<div style="margin-top:12px;padding:16px;background:#FAFAFA;border-radius:10px;border:1px solid #F0F0F0;display:flex;flex-direction:column;gap:9px" class="fade-in">
        <p style="font-size:10px;font-weight:700;color:#BBBBBB;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px">Multiplier Breakdown</p>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:#666">Base orders · ${branchDisplay}</span><span style="font-size:13px;font-weight:700;color:#1A1A1A">${fc.base}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:#666">Day-of-week pattern</span><span style="font-size:13px;font-weight:700;color:#1A1A1A">× ${fc.dowMult.toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:#666">Monthly seasonal factor</span><span style="font-size:13px;font-weight:700;color:#1A1A1A">× ${fc.monthMult.toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:#666">Special event boost</span><span style="font-size:13px;font-weight:700;color:#1A1A1A">× ${fc.eventMult.toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:#666">Post-app launch growth</span><span style="font-size:13px;font-weight:700;color:#1A1A1A">× ${fc.growthMult.toFixed(2)}</span></div>
        <div style="height:1px;background:#EBEBEB"></div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:700;color:#1A1A1A">${fc.base} × ${fc.dowMult.toFixed(2)} × ${fc.monthMult.toFixed(2)} × ${fc.eventMult.toFixed(2)} × ${fc.growthMult.toFixed(2)}</span>
          <span style="font-size:15px;font-weight:800;color:#E02020;font-variant-numeric:tabular-nums">= ${fc.orders}</span>
        </div>
       </div>`
    : "";

  document.getElementById("root").innerHTML = `
  <div style="min-height:100vh;background:#F5F5F5;padding:28px 16px 64px">
    <div style="max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:16px">

      <!-- Header -->
      <div style="padding-bottom:14px;border-bottom:2px solid #1A1A1A">
        <h1 style="font-size:21px;font-weight:800;color:#1A1A1A;letter-spacing:-0.5px;line-height:1.2">Rider Demand Forecast Tool</h1>
        <p style="font-size:12px;color:#AAA;margin-top:5px;font-weight:500;letter-spacing:0.1px">ehatud · Southern Leyte · Hinunangan &amp; Sogod Operations</p>
      </div>

      <!-- Controls -->
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:148px;display:flex;flex-direction:column;gap:6px">
          <label style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.8px">Date</label>
          <input type="date" value="${selectedDate}" onchange="setState({selectedDate:this.value,activeDot:null})" style="width:100%;padding:10px 12px;border:2px solid #E02020;border-radius:10px;font-size:14px;font-weight:500;color:#1A1A1A;background:#fff;outline:none;cursor:pointer">
        </div>
        <div style="flex:1;min-width:148px;display:flex;flex-direction:column;gap:6px">
          <label style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.8px">Branch</label>
          <select onchange="setState({selectedBranch:this.value,activeDot:null})" style="width:100%;padding:10px 12px;border:2px solid #E02020;border-radius:10px;font-size:14px;font-weight:500;color:#1A1A1A;background:#fff;outline:none;cursor:pointer">
            <option value="hinunangan" ${selectedBranch==="hinunangan"?"selected":""}>Hinunangan</option>
            <option value="sogod" ${selectedBranch==="sogod"?"selected":""}>Sogod</option>
          </select>
        </div>
      </div>

      <!-- Forecast Card -->
      <div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.03);padding:22px 24px;display:flex;flex-direction:column">
        <p style="font-size:12px;color:#BBBBBB;margin-bottom:14px;font-weight:500">${formattedDate} · ${branchDisplay}</p>
        <div style="display:inline-flex;align-items:center;padding:5px 14px;background:${fc.bg};border:2px solid ${fc.border};border-radius:20px;align-self:flex-start;margin-bottom:20px">
          <span style="font-size:10px;font-weight:800;color:${fc.color};letter-spacing:1.2px">${fc.level}</span>
        </div>
        <div style="display:flex;align-items:stretch;flex-wrap:wrap;gap:0;margin-bottom:0">
          <div style="flex:1;min-width:120px;padding-right:24px;padding-bottom:4px">
            <div style="font-size:60px;font-weight:800;color:#E02020;line-height:1;letter-spacing:-3px;font-variant-numeric:tabular-nums">${fc.orders}</div>
            <div style="font-size:10px;color:#BBBBBB;margin-top:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px">Estimated Orders</div>
          </div>
          <div style="width:1px;background:#F0F0F0;align-self:stretch;margin-bottom:4px;flex-shrink:0"></div>
          <div style="flex:1;min-width:120px;padding-left:24px;padding-bottom:4px">
            <div style="font-size:60px;font-weight:800;color:#1A1A1A;line-height:1;letter-spacing:-3px;font-variant-numeric:tabular-nums">${fc.riders}</div>
            <div style="font-size:10px;color:#BBBBBB;margin-top:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px">Riders Recommended</div>
          </div>
        </div>
        ${eventTags}
        <div style="height:1px;background:#F5F5F5;margin-top:16px;margin-bottom:14px"></div>
        <button onclick="setState(s=>({showBreakdown:!s.showBreakdown}))" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#999;padding:0;align-self:flex-start;font-family:inherit">
          <span style="font-size:11px;color:#CCC">${showBreakdown?"▾":"▸"}</span>
          <span>Show forecast breakdown</span>
        </button>
        ${breakdownPanel}
      </div>

      <!-- Chart -->
      <div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.03);padding:20px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap">
          <div>
            <h2 style="font-size:13px;font-weight:700;color:#1A1A1A;letter-spacing:-0.2px">${outlookTitle}</h2>
            <p style="font-size:11px;color:#BBBBBB;margin-top:3px">Daily order forecast · dots mark special events</p>
          </div>
          <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">${outlookBtns}</div>
        </div>
        ${buildChartSVG(selectedDate, selectedBranch, outlookDays, activeDot)}
      </div>

      <!-- Calendar -->
      <div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.03);padding:20px">
        <div style="margin-bottom:16px">
          <h2 style="font-size:13px;font-weight:700;color:#1A1A1A;letter-spacing:-0.2px">Seasonal Demand Calendar</h2>
          <p style="font-size:11px;color:#BBBBBB;margin-top:3px">Mid-month representative forecast · current month outlined in red</p>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
          ${buildCalendar(selectedBranch, selectedDate)}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:12px;padding-top:12px;border-top:1px solid #F5F5F5">
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#777"><div style="width:10px;height:10px;border-radius:3px;background:#F0FFF0;border:1.5px solid #1A8C4E;flex-shrink:0"></div>Normal</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#777"><div style="width:10px;height:10px;border-radius:3px;background:#FFF8E5;border:1.5px solid #B45309;flex-shrink:0"></div>Elevated</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#777"><div style="width:10px;height:10px;border-radius:3px;background:#FFF0F0;border:1.5px solid #C0392B;flex-shrink:0"></div>High Demand</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#777"><div style="width:10px;height:10px;border-radius:3px;background:#FFE5E5;border:1.5px solid #E02020;flex-shrink:0"></div>Critical Surge</div>
        </div>
      </div>

      <!-- Footer -->
      <p style="font-size:11px;color:#C8C8C8;text-align:center;line-height:1.7;padding:4px 16px">
        Model based on Hinunangan + Sogod daily data · 889 days Jan 2024–Jun 2026 · per-branch calibrated<br>
        Hinunangan base: ~22 orders/day &nbsp;|&nbsp; Sogod base: ~44 orders/day<br>
        Not a substitute for dispatcher judgment
      </p>

    </div>
  </div>`;
}

function handleDotClick(idx) {
  event.stopPropagation();
  setState(s => ({ activeDot: s.activeDot === idx ? null : idx }));
}
function handleChartClick() {
  if (state.activeDot !== null) setState({ activeDot: null });
}

// Initial render
render();
</script>
</body>
</html>
